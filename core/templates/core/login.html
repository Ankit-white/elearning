<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELearn — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c28;
            --border: rgba(255,255,255,0.07);
            --accent: #6c63ff;
            --accent3: #43e8b0;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --error: #ff6b6b;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow orbs */
        .orb1 {
            position: fixed;
            top: 15%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .orb2 {
            position: fixed;
            bottom: 15%;
            right: 15%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(67,232,176,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #6c63ff, #43e8b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .card-sub {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .error-msg {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.25);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--error);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
        }

        input::placeholder { color: var(--muted); }

        .submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), #8b84ff);
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108,99,255,0.4);
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent3);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="orb1"></div>
<div class="orb2"></div>

<div class="card">
    <div class="card-brand">
        <div class="logo">⚡ ELearn</div>
        <div class="tagline">Your learning platform</div>
    </div>

    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your materials</div>

    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="submit-btn">Sign In →</button>
    </form>

    <div class="footer-link">
        Don't have an account? <a href="/register/">Register here</a>
    </div>
</div>

</body>
</html>
